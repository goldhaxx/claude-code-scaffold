name: CI

# BTS-488: this workflow runs node-customized checks only (test runner).
# Hub-managed gates (lifecycle-docs, security audit) live in their own
# workflow file `.github/workflows/ccanvil-checks.yml` so hub can broadcast
# gate updates without colliding with per-node `test:` job customization.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NODE-SPECIFIC: Replace with your project's test setup and command.
      # Example (Node.js): npm ci && npm test
      # Example (Python): pip install -r requirements.txt && pytest
      # Example (Go): go test ./...
      - name: Run tests
        run: "echo TODO: Replace with your project test command"
